services:
  # Test database
  test-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: event_service_test
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password
    ports:
      - "5433:5432"  # Different port to avoid conflicts
    volumes:
      - test-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test_user -d event_service_test"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Test API service
  test-api:
    build:
      context: .
      dockerfile: Dockerfile.test
    environment:
      DB_HOST: test-db
      DB_PORT: 5432
      DB_USER: test_user
      DB_PASSWORD: test_password
      DB_NAME: event_service_test
      GIN_MODE: test
      PORT: 8080
    ports:
      - "8081:8080"  # Different port to avoid conflicts
    depends_on:
      test-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 5s
      timeout: 5s
      retries: 5
    command: ["go", "run", "./cmd/api"]

  # Test runner
  test-runner:
    build:
      context: .
      dockerfile: Dockerfile.test
    environment:
      DB_HOST: test-db
      DB_PORT: 5432
      DB_USER: test_user
      DB_PASSWORD: test_password
      DB_NAME: event_service_test
      GIN_MODE: test
    depends_on:
      test-api:
        condition: service_healthy
    volumes:
      - .:/app
      - go-cache:/go
    working_dir: /app
    command: ["make", "test"]

volumes:
  test-db-data:
  go-cache:
