# git-cliff configuration
# https://git-cliff.org/docs/configuration

[changelog]
# Template for the changelog body
# https://keats.github.io/tera/docs/#introduction
body = """
{%- macro remote_url() -%}
  https://github.com/hyka-tech-ductifact/backend
{%- endmacro -%}

{% if version -%}
  ## [{{ version | trim_start_matches(pat="v") }}]\
    ({{ self::remote_url() }}/releases/tag/{{ version }}) — {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
  ## [Unreleased]
{% endif -%}

{% for group, commits in commits | group_by(attribute="group") %}
  ### {{ group | striptags | trim | upper_first }}
  {% for commit in commits %}
    - {% if commit.scope %}**{{ commit.scope }}:** {% endif %}\
      {{ commit.message | upper_first }}\
      {% if commit.remote.pr_number %} \
        ([#{{ commit.remote.pr_number }}]({{ self::remote_url() }}/pull/{{ commit.remote.pr_number }}))\
      {% endif %}\
  {% endfor %}
{% endfor %}\n
"""
header = """# Changelog

All notable changes to this project will be documented in this file.

Generated by [git-cliff](https://git-cliff.org/).

"""
trim = true

[git]
# Parse conventional commits
# https://www.conventionalcommits.org
conventional_commits = true
filter_unconventional = true
split_commits = false

# Commit groups and ordering
commit_parsers = [
  { message = "^feat",     group = "<!-- 0 -->🚀 Features" },
  { message = "^fix",      group = "<!-- 1 -->🐛 Bug Fixes" },
  { message = "^chore",    skip = true },
  { body = ".*",           group = "<!-- 9 -->Other" },
]

# Protect sensitive information
protect_breaking_commits = false
filter_commits = false

# Tag pattern (semver tags)
tag_pattern = "v[0-9].*"

# Ignore tags matching this pattern
# skip_tags = ""

# Sort commits within a group
sort_commits = "oldest"

[remote.github]
owner = "hyka-tech-ductifact"
repo = "backend"
