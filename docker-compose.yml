# Development & CI compose — NOT for production deployment (see infra/ repo).
# Usage:
#   make db-start       → only postgres (dev, tests)
#   make docker-build   → build app image (CI smoke test)
#   make docker-start   → postgres + app (CI smoke test)

services:
  postgres:
    image: postgres:15-alpine
    container_name: ductifact_dev_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    profiles: [ smoke ]
    build:
      context: .
      args:
        APP_PORT: ${APP_PORT}
    container_name: ductifact_dev_app
    restart: unless-stopped
    ports:
      - "${APP_PORT}:${APP_PORT}"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - APP_PORT=${APP_PORT}
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - LOG_LEVEL=${LOG_LEVEL}
      - LOG_FORMAT=${LOG_FORMAT}
      - GIN_MODE=${GIN_MODE}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
