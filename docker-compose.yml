# Development compose â€” two modes:
#   make services-start â†’ postgres + minio (dev, app runs on host with air)
#   make docker-start  â†’ postgres + minio + app in Docker (smoke test)
#   make docker-stop   â†’ stop everything

services:
  postgres:
    image: postgres:15-alpine
    container_name: ductifact_dev_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: ductifact_dev_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports:
      - "${MINIO_API_PORT}:9000"   # S3 API
      - "${MINIO_CONSOLE_PORT}:9001"   # Web console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    profiles: [smoke]
    build: .
    container_name: ductifact_dev_app
    ports:
      - "${APP_PORT}:8080"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - APP_PORT=8080
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - LOG_LEVEL=${LOG_LEVEL}
      - LOG_FORMAT=${LOG_FORMAT}
      - APP_HOST=${APP_HOST}
      - JWT_TOKEN_DURATION=${JWT_TOKEN_DURATION}
      - JWT_REFRESH_TOKEN_DURATION=${JWT_REFRESH_TOKEN_DURATION}
      - GIN_MODE=${GIN_MODE}
      - RATE_LIMIT_IP_MAX=${RATE_LIMIT_IP_MAX}
      - RATE_LIMIT_IP_WINDOW=${RATE_LIMIT_IP_WINDOW}
      - RATE_LIMIT_USER_MAX=${RATE_LIMIT_USER_MAX}
      - RATE_LIMIT_USER_WINDOW=${RATE_LIMIT_USER_WINDOW}
      - LOGIN_THROTTLE_MAX_ATTEMPTS=${LOGIN_THROTTLE_MAX_ATTEMPTS}
      - LOGIN_THROTTLE_WINDOW=${LOGIN_THROTTLE_WINDOW}
      - LOGIN_THROTTLE_LOCKOUT=${LOGIN_THROTTLE_LOCKOUT}
      - MINIO_HOST=minio
      - MINIO_API_PORT=9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - MINIO_BUCKET=${MINIO_BUCKET}
      - MINIO_USE_SSL=false
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

volumes:
  postgres_data:
  minio_data:
