name: CI

# ─── When it runs ───────────────────────────────────────────
# - PRs to main: new features and fixes (deploys to staging after merge)
# - PRs to release: hotfixes for production (see CONTRIBUTING.md §7)
# - Push to main/release: final validation after merge
# - workflow_call: allows CD to re-run CI before deploying (see cd.yml)
on:
  push:
    branches: [main, release]
  pull_request:
    branches: [main, release]
  workflow_call:

# ─── Shared environment variables ────────────────────────────
# Postgres runs via docker-compose.dev.yml (single source of truth
# for image version, healthcheck, init.sql, and ports).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GO_VERSION: "1.24"
  DB_USER: ci_user
  DB_PASSWORD: ci_password
  DB_NAME: ci_db
  DB_HOST: localhost
  DB_PORT: "5432"
  APP_PORT: "8080"
  JWT_SECRET: ci-test-secret-at-least-32-characters-long
  CORS_ORIGINS: "*"
  CONTRACT_VERSION: "0.2.0"
  LOG_LEVEL: error
  LOG_FORMAT: text

# ─── Jobs ────────────────────────────────────────────────────
jobs:

  # ── 0. Branch name & target validation ─────────────────────
  branch-rules:
    name: Branch Rules
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate branch name and target
        env:
          BRANCH: ${{ github.head_ref }}
          BASE: ${{ github.base_ref }}
        run: make validate-branch

  # ── 1. Lint + static analysis ──────────────────────────────
  lint:
    name: Lint & Vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest

      - name: Lint
        run: make lint

  # ── 2. Unit tests ─────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@latest

      - name: Run unit tests
        run: make test-unit CI=1 COVERAGE=1

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: unit-test-results.xml

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.html
            coverage.out

  # ── 3. Integration tests (need Postgres) ──────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start Postgres
        run: make db-start

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@latest

      - name: Run integration tests
        run: make test-integration CI=1

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: integration-test-results.xml

  # ── 4. Contract tests (need Postgres + running API) ────────
  contract-tests:
    name: Contract Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch contract spec
        run: make fetch-contract

      - name: Start Postgres
        run: make db-start

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@latest

      - name: Build and start API server
        run: make app-start

      - name: Run contract tests
        run: make test-contract CI=1

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: contract-test-results
          path: contract-test-results.xml

  # ── 5. E2E tests (need Postgres + running API) ────────────
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start Postgres
        run: make db-start

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@latest

      - name: Build and start API server
        run: make app-start

      - name: Run E2E tests
        run: make test-e2e CI=1

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: e2e-test-results.xml

  # ── 6. Docker smoke test ─────────────────────────────────────
  docker-smoke:
    name: Docker Smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: make prod-build

      - name: Start containers
        run: make prod-start

      - name: Health check
        run: curl --fail --retry 3 --retry-delay 2 http://localhost:${{ env.APP_PORT }}/api/v1/health

      - name: Teardown
        if: always()
        run: make prod-stop

  # ── 7. Publish test results ────────────────────────────────
  test-results:
    name: Publish Test Results
    if: always()
    needs: [unit-tests, integration-tests, contract-tests, e2e-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all test artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "*-test-results"
          merge-multiple: true

      - name: Publish test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: "*-test-results.xml"
          check_run: false
          comment_mode: off

      - name: Download coverage report
        if: always()
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: coverage-report
        continue-on-error: true

      - name: Publish coverage
        id: coverage
        if: always()
        uses: vladopajic/go-test-coverage@v2
        with:
          profile: coverage-report/coverage.out

      - name: Coverage summary
        if: always() && steps.coverage.outputs.total-coverage
        run: |
          echo "## 🧪 Unit Test Coverage: ${{ steps.coverage.outputs.total-coverage }}%" >> $GITHUB_STEP_SUMMARY
