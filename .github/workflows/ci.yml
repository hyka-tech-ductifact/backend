name: CI

# ─── When it runs ───────────────────────────────────────────
# - PRs to main: new features and fixes (deploys to staging after merge)
# - PRs to release: hotfixes for production (see CONTRIBUTING.md §7)
# - workflow_call: allows CD to re-run CI before deploying (see cd.yml)
on:
  pull_request:
    branches: [main, release]
  workflow_call:

# ─── Cancel outdated runs ───────────────────────────────────
# If a new push arrives on the same branch, cancel the previous run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ─── Shared environment variables ────────────────────────────
# Dev dependencies (postgres) run via backend/docker-compose.yml.
# Docker smoke test uses standalone docker build + run (no compose).
env:
  CI: "1"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GO_VERSION: "1.24"
  DB_USER: ci_user
  DB_PASSWORD: ci_password
  DB_NAME: ci_db
  DB_HOST: localhost
  DB_PORT: "5432"
  APP_PORT: "8080"
  JWT_SECRET: ci-test-secret-at-least-32-characters-long
  CORS_ORIGINS: "*"
  LOG_LEVEL: error
  LOG_FORMAT: text
  GIN_MODE: test

# ─── Jobs ────────────────────────────────────────────────────
jobs:

  # ── 0. Branch name & target validation ─────────────────────
  branch-rules:
    name: Branch Rules
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate branch name and target
        env:
          BRANCH: ${{ github.head_ref }}
          BASE: ${{ github.base_ref }}
        run: make validate-branch

  # ── 1. Lint + static analysis ──────────────────────────────
  lint:
    name: Lint & Vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest

      - name: Lint
        run: make lint

  # ── 2. Unit tests ─────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@latest

      - name: Run unit tests
        run: make test-unit

  # ── 3. Integration tests (need Postgres) ──────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start Postgres
        run: make services-start

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@latest

      - name: Run integration tests
        run: make test-integration

  # ── 4. Contract tests (need Postgres + running API) ────────
  contract-tests:
    name: Contract Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@latest

      - name: Build and start API server
        run: make app-start

      - name: Run contract tests
        run: make test-contract

  # ── 5. E2E tests (need Postgres + running API) ────────────
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@latest

      - name: Build and start API server
        run: make app-start

      - name: Run E2E tests
        run: make test-e2e

  # ── 6. Docker smoke test ─────────────────────────────────────
  docker-smoke:
    name: Docker Smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and start services
        run: make docker-start

      - name: Health check
        run: curl --fail --retry 3 --retry-delay 2 http://localhost:${{ env.APP_PORT }}/health

      - name: Teardown
        if: always()
        run: make docker-stop

