name: CI

# ─── When it runs ───────────────────────────────────────────
# - PRs to main: new features and fixes (deploys to staging after merge)
# - PRs to release: hotfixes for production (see CONTRIBUTING.md §7)
# - workflow_call: allows CD to re-run CI before deploying (see cd.yml)
on:
  push:
    branches: [main]
  pull_request:
    branches: [main, release]
  workflow_call:

# ─── Cancel outdated runs ───────────────────────────────────
# If a new push arrives on the same branch, cancel the previous run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ─── Shared environment variables ────────────────────────────
# Dev dependencies (postgres) run via backend/docker-compose.yml.
# Docker smoke test uses standalone docker build + run (no compose).
env:
  CI: "1"
  GO_VERSION: "1.26"
  DB_USER: ci_user
  DB_PASSWORD: ci_password
  DB_NAME: ci_db
  DB_HOST: localhost
  DB_PORT: "5432"
  APP_PORT: "8080"
  JWT_SECRET: ci-test-secret-at-least-32-characters-long
  CORS_ORIGINS: "*"
  LOG_LEVEL: error
  LOG_FORMAT: text
  APP_HOST: localhost
  JWT_TOKEN_DURATION: "15m"
  JWT_REFRESH_TOKEN_DURATION: "168h"
  RATE_LIMIT_IP_MAX: "10000"
  RATE_LIMIT_IP_WINDOW: "1m"
  RATE_LIMIT_USER_MAX: "10000"
  RATE_LIMIT_USER_WINDOW: "1m"
  LOGIN_THROTTLE_MAX_ATTEMPTS: "100"
  LOGIN_THROTTLE_WINDOW: "1m"
  LOGIN_THROTTLE_LOCKOUT: "1m"
  GIN_MODE: test

# ─── Jobs ────────────────────────────────────────────────────
jobs:

  # ── 0. PR validation (branch name + title format) ───────────
  pr-rules:
    name: PR Rules
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate branch name and target
        env:
          BRANCH: ${{ github.head_ref }}
          BASE: ${{ github.base_ref }}
        run: make validate-branch

      - name: Validate PR title (Conventional Commits)
        uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            chore
          requireScope: false
          subjectPattern: ^.+$
          subjectPatternError: "PR title must have a description after the type, e.g. 'feat: add login endpoint'"

  # ── 1. Lint + static analysis ──────────────────────────────
  lint:
    name: Lint & Vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest

      - name: Lint
        run: make lint

  # ── 2. Unit tests ─────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@latest

      - name: Run unit tests
        run: make test-unit

  # ── 3. Integration tests (need Postgres) ──────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Start Postgres
        run: make services-start

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@latest

      - name: Run integration tests
        run: make test-integration

  # ── 4. Contract tests (Schemathesis — need Postgres + running API) ─
  contract-tests:
    name: Contract Tests (Schemathesis)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@latest

      - name: Install Schemathesis
        run: pip install --quiet schemathesis

      - name: Build and start API server
        run: make app-start

      - name: Run contract tests
        env:
          ST_API_HOST: localhost
          ST_API_PORT: ${{ env.APP_PORT }}
          ST_AUTH_EMAIL: alice@ductifact.dev
          ST_AUTH_PASSWORD: password123
        run: make test-contract

      - name: Upload Schemathesis report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: schemathesis-report
          path: schemathesis-report/


  # ── 5. E2E tests (need Postgres + running API) ────────────
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@latest

      - name: Build and start API server
        run: make app-start

      - name: Run E2E tests
        run: make test-e2e

  # ── 6. Docker smoke test ─────────────────────────────────────
  docker-smoke:
    name: Docker Smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build and start services
        run: make docker-start

      - name: Health check
        run: curl --fail --retry 3 --retry-delay 2 http://localhost:${{ env.APP_PORT }}/health

      - name: Teardown
        if: always()
        run: make docker-stop

