name: CD

# ─── When it runs ───────────────────────────────────────────
# Staging:    after CI passes on main (PR merged → main → CI ✅ → CD)
# Production: when a version tag is pushed (git tag v0.4.0 → CD)
on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]

  push:
    tags:
      - "v*"

# ─── Shared environment variables ────────────────────────────
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

# ─── Jobs ────────────────────────────────────────────────────
jobs:

  # ══════════════════════════════════════════════════════════
  # STAGING — runs when CI passes on main
  # ══════════════════════════════════════════════════════════
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      # ── Build & push Docker image ─────────────────────────
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (staging tag)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:staging
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:staging-${{ github.sha }}

      # ── Deploy via SSH through Cloudflare Tunnel ───────────
      - name: Install cloudflared
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb \
            -o /tmp/cloudflared.deb
          sudo dpkg -i /tmp/cloudflared.deb

      - name: Verify tunnel connectivity
        run: |
          echo "=== cloudflared version ==="
          cloudflared --version

          echo "=== Checking CF Access Service Token ==="
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "CF-Access-Client-Id: ${{ secrets.CF_ACCESS_CLIENT_ID }}" \
            -H "CF-Access-Client-Secret: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}" \
            https://${{ secrets.VPS_HOST }})
          echo "HTTP status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" = "403" ] || [ "$HTTP_STATUS" = "302" ]; then
            echo "ERROR: Service Token NOT accepted (HTTP $HTTP_STATUS)."
            echo "302 = redirect to login (token ignored). 403 = token rejected."
            echo ""
            echo "Fix in Cloudflare Dashboard:"
            echo "  1. Zero Trust → Access → Applications"
            echo "  2. Find the app for ssh.jcapsule.work"
            echo "  3. Add a policy with Action: SERVICE AUTH (not Allow)"
            echo "  4. Include → Service Token → github-actions-deploy"
            exit 1
          fi
          echo "Service Token accepted (HTTP $HTTP_STATUS)."

          echo "=== Checking SSH key ==="
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keygen -l -f ~/.ssh/deploy_key && echo "SSH key is valid" || { echo "ERROR: Invalid SSH key"; exit 1; }

      - name: Deploy to staging server
        run: |
          # Pre-authenticate: get a cached JWT token for cloudflared access ssh
          cloudflared access token --hostname ${{ secrets.VPS_HOST }} --app-token-id $CF_ACCESS_CLIENT_ID --app-token-secret $CF_ACCESS_CLIENT_SECRET || \
          cloudflared access token --hostname ${{ secrets.VPS_HOST }} || true

          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          ssh -v -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              -o "ProxyCommand=cloudflared access ssh --hostname %h" \
              -i ~/.ssh/deploy_key \
              ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
              "~/ductifact/infra/scripts/deploy.sh staging ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:staging"

  # ══════════════════════════════════════════════════════════
  # PRODUCTION — runs when a v* tag is pushed
  # ══════════════════════════════════════════════════════════
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      # ── Build & push Docker image ─────────────────────────
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build and push (production tags)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.VERSION }}

      # ── Deploy via SSH through Cloudflare Tunnel ───────────
      - name: Install cloudflared
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb \
            -o /tmp/cloudflared.deb
          sudo dpkg -i /tmp/cloudflared.deb

      - name: Verify tunnel connectivity
        run: |
          echo "=== cloudflared version ==="
          cloudflared --version

          echo "=== Checking CF Access Service Token ==="
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "CF-Access-Client-Id: ${{ secrets.CF_ACCESS_CLIENT_ID }}" \
            -H "CF-Access-Client-Secret: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}" \
            https://${{ secrets.VPS_HOST }})
          echo "HTTP status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" = "403" ] || [ "$HTTP_STATUS" = "302" ]; then
            echo "ERROR: Service Token NOT accepted (HTTP $HTTP_STATUS)."
            echo "302 = redirect to login (token ignored). 403 = token rejected."
            echo ""
            echo "Fix in Cloudflare Dashboard:"
            echo "  1. Zero Trust → Access → Applications"
            echo "  2. Find the app for ssh.jcapsule.work"
            echo "  3. Add a policy with Action: SERVICE AUTH (not Allow)"
            echo "  4. Include → Service Token → github-actions-deploy"
            exit 1
          fi
          echo "Service Token accepted (HTTP $HTTP_STATUS)."

          echo "=== Checking SSH key ==="
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keygen -l -f ~/.ssh/deploy_key && echo "SSH key is valid" || { echo "ERROR: Invalid SSH key"; exit 1; }

      - name: Deploy to production server
        run: |
          # Pre-authenticate: get a cached JWT token for cloudflared access ssh
          cloudflared access token --hostname ${{ secrets.VPS_HOST }} --app-token-id $CF_ACCESS_CLIENT_ID --app-token-secret $CF_ACCESS_CLIENT_SECRET || \
          cloudflared access token --hostname ${{ secrets.VPS_HOST }} || true

          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          ssh -v -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              -o "ProxyCommand=cloudflared access ssh --hostname %h" \
              -i ~/.ssh/deploy_key \
              ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
              "~/ductifact/infra/scripts/deploy.sh prod ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
