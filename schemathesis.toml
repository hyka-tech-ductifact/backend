# ═══════════════════════════════════════════════════════════════
# Schemathesis — Contract & Fuzz Testing Configuration
# ═══════════════════════════════════════════════════════════════
# Docs: https://schemathesis.readthedocs.io/en/stable/reference/configuration/
#
# Usage:
#   make test-contract                    (local — requires running API)
#   schemathesis run contracts/openapi/bundled.yaml   (manual)

# ─── Base URL ────────────────────────────────────────────────
# Uses env vars so the same config works locally and in CI.
# Set ST_API_HOST / ST_API_PORT before running (defaults provided by Makefile).
# Includes /v1 prefix to match the OpenAPI spec's server path.
base-url = "http://${ST_API_HOST}:${ST_API_PORT}/v1"

# ─── Workers ─────────────────────────────────────────────────
workers = "auto"

# ─── Wait for API to be ready ────────────────────────────────
wait-for-schema = 10

# ─── Continue after first failure to collect all issues ──────
continue-on-failure = true

# ─── Authentication ──────────────────────────────────────────
# Dynamic: POST /v1/auth/register creates a fresh user per run.
# Uses a unique email generated by the Makefile (timestamp-based).
# Requires ST_AUTH_NAME, ST_AUTH_EMAIL and ST_AUTH_PASSWORD env vars.
[auth.dynamic.openapi.bearerAuth]
path = "/auth/register"
payload = { name = "${ST_AUTH_NAME}", email = "${ST_AUTH_EMAIL}", password = "${ST_AUTH_PASSWORD}" }
extract_selector = "/access_token"

# ─── Checks ─────────────────────────────────────────────────
# All checks enabled by default. Tune expected statuses if needed.
[checks]
max_response_time = 10.0

# ─── Filtering ───────────────────────────────────────────────
# Exclude /health: it uses a different server prefix (no /v1) in the OpenAPI spec,
# which conflicts with our base-url. Health is tested separately via smoke tests.
[[operations]]
include-path = "/health"
enabled = false

# ─── Data Generation ────────────────────────────────────────
[generation]
mode = "all"            # positive + negative data
max-examples = 50       # per operation (increase for deeper testing)
allow-x00 = false       # avoid NULL bytes that trip up Go handlers
codec = "utf-8"
database = ":memory:"   # don't persist hypothesis DB between runs

# ─── Phases ─────────────────────────────────────────────────
[phases.examples]
enabled = true

[phases.coverage]
enabled = true

[phases.fuzzing]
enabled = true

[phases.stateful]
enabled = true

# ─── Reports ────────────────────────────────────────────────
[reports]
directory = "schemathesis-report"

[reports.junit]
enabled = true
