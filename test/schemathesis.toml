# ═══════════════════════════════════════════════════════════════
# Schemathesis — Contract & Fuzz Testing Configuration
# ═══════════════════════════════════════════════════════════════
# Docs: https://schemathesis.readthedocs.io/en/stable/reference/configuration/
#
# Usage:
#   make test-contract                       (local: 20 examples, CI: 100)
#   make test-contract ST_MAX_EXAMPLES=200   (manual override)
#
# Auth header (-H) is the only flag injected by the Makefile.
# Everything else lives here.

# ─── Base URL ────────────────────────────────────────────────
base-url = "http://localhost:8080/v1"

# ─── Wait for API to be ready ────────────────────────────────
wait-for-schema = 10

# ─── Network resilience ─────────────────────────────────────
request-retries = 3

# ─── Continue after first failure to collect all issues ──────
continue-on-failure = true

# ─── Hooks ───────────────────────────────────────────────────
# Custom media-type strategies for image uploads (image/png, jpeg, webp).
# The Python module is mounted into the Docker container by the Makefile.
# Loaded via SCHEMATHESIS_HOOKS env var (see Makefile) to avoid conflicts
# with the tracecov plugin bundled in Schemathesis 4.x.
# hooks = "schemathesis_hooks"

# ─── Authentication ──────────────────────────────────────────
# JWT obtained by the Makefile (curl → /auth/register|login) and
# injected via -H 'Authorization: Bearer <token>' on the CLI.

# ─── Checks ─────────────────────────────────────────────────
[checks]
max_response_time = 10.0

# use_after_free only fires in the stateful phase. Our predefined piece
# definitions return 403 on DELETE (cannot delete system defs), but
# Schemathesis treats any non-404 as a successful deletion and then flags
# the subsequent GET 200 as "use after free". Disable globally (same
# real effect as phase-only, since this check is inherently stateful).
use_after_free.enabled = false

# ─── Filtering ───────────────────────────────────────────────
# Exclude /health: it uses a different server prefix (no /v1) in the OpenAPI spec,
# which conflicts with our base-url. Health is tested separately via smoke tests.
[[operations]]
include-path = "/health"
enabled = false

# ─── Data Generation ────────────────────────────────────────
[generation]
max-examples = 50       # fallback when run outside Makefile (Makefile: local=20, CI=100)
mode = "all"            # positive + negative data
allow-x00 = false       # avoid NULL bytes that trip up Go handlers
codec = "utf-8"
database = ":memory:"   # don't persist hypothesis DB between runs
with-security-parameters = false  # don't fuzz auth tokens; use static header
allow-extra-parameters = false    # don't generate unknown query/header params (our API ignores them per REST standard)

# ─── Phases ─────────────────────────────────────────────────
# All enabled here; the Makefile may restrict via --phases for local runs.
[phases.examples]
enabled = true

[phases.coverage]
enabled = true

[phases.fuzzing]
enabled = true

[phases.stateful]
enabled = true



# ─── Reports ────────────────────────────────────────────────
[reports]
directory = "schemathesis-report"

[reports.junit]
enabled = true
